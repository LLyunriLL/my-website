<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CHILL OUT Kuala Lumpur</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background-image: url("night-picnic.jpg");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  position: relative;
}

/* Dark overlay */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: -1;
}

/* Title */
.header-title {
  text-align: center;
  font-size: 58px;
  font-weight: 900;
  letter-spacing: 4px;
  margin-top: 60px;
  background: linear-gradient(90deg, #ffffff, #ffd6f0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 8px 30px rgba(0,0,0,0.8);
  position: relative;
}

.header-title::after {
  content: "";
  display: block;
  width: 140px;
  height: 4px;
  margin: 20px auto 0;
  background: linear-gradient(90deg, #ff4da6, #ff99cc);
  border-radius: 4px;
}

/* Main container */
.container {
  background: rgba(255,255,255,0.97);
  max-width: 1100px;
  margin: 50px auto 80px;
  padding: 50px;
  border-radius: 24px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.25);
}

/* Product list */
.products {
  display: flex;
  justify-content: center;
  gap: 50px;
}

.card {
  background: white;
  width: 260px;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 12px 30px rgba(0,0,0,0.15);
  cursor: pointer;
  transition: 0.4s;
}

.card:hover {
  transform: translateY(-12px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.25);
}

/* Product detail */
.detail {
  display: flex;
  gap: 50px;
  align-items: center;
}

.image-box {
  width: 420px;
  height: 420px;
  background: #eee;
  border-radius: 20px;
}

.info {
  flex: 1;
}

select {
  padding: 10px;
  margin-top: 15px;
  border-radius: 8px;
}

.total {
  font-size: 22px;
  margin: 25px 0;
  font-weight: bold;
}

.buy-btn {
  background: #E91E63;
  color: white;
  border: none;
  padding: 16px 28px;
  border-radius: 12px;
  font-size: 18px;
  cursor: pointer;
  transition: 0.3s;
}

.buy-btn:hover {
  background: #c2185b;
}

.back-btn {
  margin-top: 15px;
  display: inline-block;
  background: #777;
  color: white;
  padding: 10px 20px;
  border-radius: 10px;
  cursor: pointer;
}

/* Thank you page */
.thanks {
  text-align: center;
  padding: 120px 20px;
  background: linear-gradient(to bottom, #ff4da6, #ffe6f2);
  color: white;
  font-size: 36px;
  border-radius: 24px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div class="header-title">
  CHILL OUT Kuala Lumpur
</div>

<div id="app"></div>

<script>
const products = [
  { name: "Picnic", price: 10 },
  { name: "Language Exchange", price: 20 },
  { name: "Workshop", price: 30 }
];

const app = document.getElementById("app");

function showProducts() {
  app.innerHTML = `
    <div class="container">
      <h2 style="text-align:center; font-weight:700;">PRODUCTS</h2>
      <div class="products">
        ${products.map((p, i) => `
          <div class="card" onclick="showDetail(${i})">
            <h3>${p.name}</h3>
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

function showDetail(index) {
  const product = products[index];

  app.innerHTML = `
    <div class="container">
      <div class="detail">
        <div class="image-box"></div>

        <div class="info">
          <h2>${product.name}</h2>
          <p style="font-size:20px;">Price: ${product.price} RM</p>

          <label>Quantity:</label>
          <select id="qty" onchange="updateTotal(${product.price})">
            ${[...Array(10)].map((_, i) => `<option value="${i+1}">${i+1}</option>`).join("")}
          </select>

          <div class="total" id="total">
            Total: ${product.price} RM
          </div>

          <button class="buy-btn" onclick="showThanks()">
            Purchase
          </button>
          <br>
          <button class="back-btn" onclick="showProducts()">
            Back
          </button>
        </div>
      </div>
    </div>
  `;
}

function updateTotal(price) {
  const qty = document.getElementById("qty").value;
  document.getElementById("total").innerText =
    "Total: " + (price * qty) + " RM";
}

function showThanks() {
  app.innerHTML = `
    <div class="container">
      <div class="thanks">
        Thank you for your purchase!
      </div>
    </div>
  `;
}

showProducts();
</script>

</body>
</html>
