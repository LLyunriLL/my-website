<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chill Shop</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-image: url("night-picnic.jpg");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

/* 共通中央ボックス */
.container {
  background: rgba(255,255,255,0.95);
  max-width: 1100px;
  margin: 60px auto;
  padding: 40px;
  border-radius: 20px;
}

/* 商品一覧 */
.products {
  display: flex;
  justify-content: center;
  gap: 40px;
}

.card {
  background: white;
  width: 250px;
  padding: 20px;
  border-radius: 16px;
  text-align: center;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
}

.price {
  font-weight: bold;
  margin-top: 10px;
}

/* 商品詳細ページ */
.detail {
  display: flex;
  gap: 40px;
  align-items: center;
}

.image-box {
  width: 400px;
  height: 400px;
  background: #ddd;
  border-radius: 16px;
}

.info {
  flex: 1;
}

select {
  padding: 8px;
  margin-top: 10px;
}

.total {
  font-size: 20px;
  margin: 20px 0;
  font-weight: bold;
}

.buy-btn {
  background: #E91E63;
  color: white;
  border: none;
  padding: 14px 24px;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

/* サンクスページ */
.thanks {
  text-align: center;
  padding: 100px 20px;
  background: linear-gradient(135deg, #ff9ecb, #ffc1e3);
  color: white;
  font-size: 32px;
  border-radius: 20px;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
const products = [
  { name: "ピクニック", price: 10 },
  { name: "Language Exchange", price: 20 },
  { name: "Workshop", price: 30 }
];

const app = document.getElementById("app");

function showProducts() {
  app.innerHTML = `
    <div class="container">
      <h1 style="text-align:center;">商品一覧</h1>
      <div class="products">
        ${products.map((p, i) => `
          <div class="card" onclick="showDetail(${i})">
            <h3>${p.name}</h3>
            <p class="price">${p.price} RM</p>
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

function showDetail(index) {
  const product = products[index];

  app.innerHTML = `
    <div class="container">
      <div class="detail">
        <div class="image-box"></div>

        <div class="info">
          <h2>${product.name}</h2>
          <p style="font-size:18px;">${product.price} RM</p>

          <label>数量：</label>
          <select id="qty" onchange="updateTotal(${product.price})">
            ${[...Array(10)].map((_, i) => `<option value="${i+1}">${i+1}</option>`).join("")}
          </select>

          <div class="total" id="total">
            合計：${product.price} RM
          </div>

          <button class="buy-btn" onclick="showThanks()">
            購入する
          </button>
        </div>
      </div>
    </div>
  `;
}

function updateTotal(price) {
  const qty = document.getElementById("qty").value;
  document.getElementById("total").innerText =
    "合計：" + (price * qty) + " RM";
}

function showThanks() {
  app.innerHTML = `
    <div class="container">
      <div class="thanks">
        ご購入ありがとうございました！
      </div>
    </div>
  `;
}

showProducts();
</script>

</body>
</html>
